type UserProfile @model @auth(rules: [{allow: owner, ownerField: "owner"}])
{
  name: String
  age: Int
  medicalHistory: String
  notificationPrefs: String
}

type HealthEntry @model @auth(rules: [{allow: owner, ownerField: "owner"}])
{
  type: String!
  subtype: String
  name: String!
  severity: Int
  bodyArea: String
  notes: String
  tags: String
  details: String
  dose: String
  unit: String
  route: String
  reason: String
  time: String!
}

type ExposureTest @model @auth(rules: [{allow: owner, ownerField: "owner"}])
{
  testName: String!
  allergen: String!
  amount: Float
  unit: String
  servingContext: String
  protocol: String
  baselineSymptoms: String
  testDate: String!
  testTime: String
  monitoringDuration: String
  reminders: String
  status: String!
  results: String
  reactions: String
}

type FamilyMember @model @auth(rules: [{allow: owner, ownerField: "owner"}])
{
  name: String!
  relationship: String!
  age: Int
  knownAllergies: String
  medicalConditions: String
  medications: String
  notes: String
}

type Query {
  askMedGemma(question: String): String @function(name: "FnAskMedGemma") @auth(rules: [{allow: private}])
  askNovaMicro(question: String, history: String): String @function(name: "FnAskNovaMicro") @auth(rules: [{allow: private}])
  logConversationEvent(userId: String, event: String): Boolean @function(name: "FnLogConversationEvent") @auth(rules: [{allow: private}])
  getConversationLogs(userId: String): String @function(name: "FnGetConversationLogs") @auth(rules: [{allow: private}])
}